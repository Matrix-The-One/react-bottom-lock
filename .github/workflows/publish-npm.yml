name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm check

      - name: Read package name
        id: package
        shell: bash
        run: echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"

      - name: Check whether the package already exists on npm
        id: npm_package
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}" version >/dev/null 2>&1; then
            echo "bootstrap=false" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrap=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: "chore: 发布版本"
          commit: "chore: 发布版本"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bootstrap publish token
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.npm_package.outputs.bootstrap == 'true'
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "The package is not published on npm yet. Add repository secret NPM_TOKEN for the bootstrap publish, then remove it after trusted publishing is configured." >&2
            exit 1
          fi

          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

      - name: Publish package to npm with trusted publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm release

      - name: Read released version
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: released_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        run: |
          TAG="v${{ steps.released_version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag "$TAG"
          fi

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on origin."
          else
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        if: steps.changesets.outputs.hasChangesets == 'false'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.released_version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          node - <<'NODE' > release-notes.md
          const fs = require('fs');
          const version = require('./package.json').version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const match = changelog.match(
            new RegExp(`## ${escapedVersion}\\n([\\s\\S]*?)(?=\\n## \\d|$)`)
          );

          process.stdout.write((match?.[1] ?? `Release ${version}`).trim() + '\n');
          NODE

          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
