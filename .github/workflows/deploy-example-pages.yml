name: Deploy Example to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build example site
        run: pnpm --dir example build

      - name: Publish to gh-pages branch
        env:
          DEPLOY_DIR: ${{ runner.temp }}/gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf "$DEPLOY_DIR"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "$DEPLOY_DIR" FETCH_HEAD
          else
            git worktree add --detach "$DEPLOY_DIR"
            (
              cd "$DEPLOY_DIR"
              git checkout --orphan gh-pages
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          rsync -a --delete example/dist/ "$DEPLOY_DIR"/
          touch "$DEPLOY_DIR/.nojekyll"

          cd "$DEPLOY_DIR"
          git add --all

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "chore: 更新 GitHub Pages"
          git push origin HEAD:gh-pages
